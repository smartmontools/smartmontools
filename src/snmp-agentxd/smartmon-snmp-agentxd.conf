# /etc/smartmontools/snmp-agentxd.conf
# Configuration for smartmon-snmp-agentxd
#
# smartmon-snmp-agentxd reads SMART data from JSON state files written by
# smartd's --jsonstate option.  You MUST configure smartd with -x (extended)
# to include NVMe self-test logs and SAS error counters in the state files:
#
#   DEVICESCAN -x --jsonstate /run/smartmontools/json/
#
# Using -a instead of -x will leave the NVMe self-test and SAS error counter
# MIB tables empty.
#
# (or per-device equivalents) and then set state_dir below to the same path.

# -----------------------------------------------------------------------
# REQUIRED: directory where smartd writes --jsonstate files.
# smartmon-snmp-agentxd will refuse to start if this is not set or if
# smartd is running without --jsonstate configured.
# -----------------------------------------------------------------------
state_dir   /run/smartmontools/json/

# -----------------------------------------------------------------------
# Path to the AgentX master socket.  Must match agentXSocket in snmpd.conf.
# -----------------------------------------------------------------------
agentx_socket   /var/agentx/master

# -----------------------------------------------------------------------
# Maximum age of cached SNMP data in seconds.  Stale data older than
# 2 × cache_timeout triggers a LOG_WARNING to syslog.
# -----------------------------------------------------------------------
cache_timeout   300
